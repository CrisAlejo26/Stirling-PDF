services:
  stirling-pdf:
    image: stirling-pdf-custom:latest
    container_name: pdfox
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - ./configs:/configs:rw
      - ./logs:/logs:rw
      - ./tessdata:/usr/share/tessdata:rw
      - ./pipeline:/pipeline:rw
    environment:
      DISABLE_ADDITIONAL_FEATURES: "true"
      SECURITY_ENABLELOGIN: "false"
      SYSTEM_DEFAULTLOCALE: es-ES
      UI_APPNAME: PDFox
      SYSTEM_MAXFILESIZE: "100"
      METRICS_ENABLED: "true"
      PUID: "1000"
      PGID: "1000"
      TZ: "America/Bogota"
    privileged: true
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/api/v1/info/status | grep -q 'UP'"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - fox-network

networks:
  fox-network:
    driver: bridge
